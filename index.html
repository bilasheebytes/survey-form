<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./images/favicon.png"
      type="image/png"
      sizes="32x32"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Survey Form</title>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 class="title text-center">freeCodeCamp Survey Form</h1>
        <p class="description text-center">
          Thank you for taking the time to help us improve the platform
        </p>
      </header>
      <form class="survey-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            class="form-control"
            placeholder="Enter your name"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            class="form-control"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label for="number">Age <span class="clue">(optional)</span></label>
          <input
            type="number"
            name="age"
            id="number"
            class="form-control"
            min="10"
            max="99"
            placeholder="Age"
          />
        </div>
        <div class="form-group">
          <label for="role"
            >Which option best describes your current role?</label
          >
          <select id="role" name="role" class="form-control" required>
            <option disabled selected value="">Select current role</option>
            <option value="student">Student</option>
            <option value="job">Full Time Job</option>
            <option value="learner">Full Time Learner</option>
            <option value="prefer-no">Prefer not to say</option>
            <option value="other">Other</option>
          </select>
        </div>
        <fieldset class="form-group">
          <legend>Would you recommend freeCodeCamp to a friend?</legend>
          <label for="definitely">
            <input
              type="radio"
              class="input-radio"
              name="user-recommend"
              id="definitely"
              value="definitely"
              checked
            />
            Definitely
          </label>
          <label for="maybe">
            <input
              type="radio"
              class="input-radio"
              name="user-recommend"
              id="maybe"
              value="maybe"
            />
            Maybe
          </label>
          <label for="not-sure">
            <input
              type="radio"
              class="input-radio"
              name="user-recommend"
              id="not-sure"
              value="not-sure"
            />
            Not sure
          </label>
        </fieldset>
        <div class="form-group">
          <label for="favorite-feature"
            >What is your favorite feature of freeCodeCamp?</label
          >
          <select
            class="form-control"
            id="favorite-feature"
            name="favorite-feature"
            required
          >
            <option disabled selected value="">Select an option</option>
            <option value="challenges">Challenges</option>
            <option value="projects">Projects</option>
            <option value="community">Community</option>
            <option value="open-source">Open Source</option>
          </select>
        </div>
        <fieldset class="form-group">
          <legend>
            What would you like to see improved?
            <span class="clue">(Check all that apply)</span>
          </legend>
          <label for="front-end-projects"
            ><input
              name="prefer"
              id="front-end-projects"
              value="front-end-projects"
              type="checkbox"
              class="input-checkbox"
            />Front-end Projects</label
          >
          <label for="back-end-projects">
            <input
              name="prefer"
              id="back-end-projects"
              value="back-end-projects"
              type="checkbox"
              class="input-checkbox"
            />Back-end Projects</label
          >
          <label for="data-visualization"
            ><input
              name="prefer"
              id="data-visualization"
              value="data-visualization"
              type="checkbox"
              class="input-checkbox"
            />Data Visualization</label
          >
          <label for="challenges"
            ><input
              name="prefer"
              id="challenges"
              value="challenges"
              type="checkbox"
              class="input-checkbox"
            />Challenges</label
          >
          <label for="open-source-community"
            ><input
              name="prefer"
              id="open-source-community"
              value="open-source-community"
              type="checkbox"
              class="input-checkbox"
            />Open Source Community</label
          >
          <label for="gitter-help-rooms"
            ><input
              name="prefer"
              id="gitter-help-rooms"
              value="gitter-help-rooms"
              type="checkbox"
              class="input-checkbox"
            />Gitter help rooms</label
          >
          <label for="videos"
            ><input
              name="prefer"
              id="videos"
              value="videos"
              type="checkbox"
              class="input-checkbox"
            />Videos</label
          >
          <label for="city-meetups"
            ><input
              name="prefer"
              id="city-meetups"
              value="city-meetups"
              type="checkbox"
              class="input-checkbox"
            />City Meetups</label
          >
          <label for="wiki"
            ><input
              name="prefer"
              id="wiki"
              value="wiki"
              type="checkbox"
              class="input-checkbox"
            />Wiki</label
          >
          <label for="forum"
            ><input
              name="prefer"
              id="forum"
              value="forum"
              type="checkbox"
              class="input-checkbox"
            />Forum</label
          >
          <label for="additional-courses"
            ><input
              name="prefer"
              id="additional-courses"
              value="additional-courses"
              type="checkbox"
              class="input-checkbox"
            />Additional Courses</label
          >
        </fieldset>
        <div class="form-group">
          <label for="comment">Any comments or suggestions?</label>
          <textarea
            id="comment"
            name="comment"
            class="input-textarea"
            placeholder="Enter your comment here..."
          ></textarea>
        </div>
        <div class="form-group">
          <button class="submit-button" type="submit">Submit</button>
        </div>
      </form>
    </main>
  </body>
</html>
